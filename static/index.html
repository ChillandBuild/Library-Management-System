<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Library Management System - Manage catalog, circulation, members, and more">
    <title>📚 Library Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📚</span>
                    <span class="logo-text">LibraryMS</span>
                </div>
            </div>
            <div class="sidebar-menu" id="nav-menu">
                <!-- Populated by JS based on role -->
            </div>
            <div class="sidebar-footer">
                <div class="user-info" id="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-details">
                        <span class="user-name" id="user-name">Loading...</span>
                        <span class="user-role" id="user-role">—</span>
                    </div>
                </div>
                <button class="btn-logout" id="btn-logout" title="Logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <div id="page-content">
                <!-- Dynamic page content loaded here -->
            </div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="login-overlay" class="login-overlay active">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">📚</div>
                <h1>Library Management System</h1>
                <p>Sign in to your account</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <div id="login-error" class="error-message" style="display:none"></div>
                <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                    Sign In
                </button>
                <div class="login-hint">
                    <p>Demo accounts: <strong>admin</strong> / admin123 · <strong>librarian</strong> / librarian123</p>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/js/app.js"></script>
</body>
</html>
